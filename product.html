<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product | RAM SAREES</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="product">
  <div id="siteChrome"></div>
  <main class="container narrow product-page">
    <div class="breadcrumb">Home &nbsp;&gt;&nbsp; Shop &nbsp;&gt;&nbsp; <span id="breadcrumbName">Cotton Floral Saree</span></div>
    <section class="product-detail">
      <div class="gallery">
        <div class="thumbs" id="thumbs"></div>
        <img class="main-product-img" id="mainProductImage" src="" alt="">
      </div>
      <div class="product-info">
        <h1 id="productName">Cotton Floral Saree</h1>
        <div class="price" id="productPrice">₹1,599</div>
        <p id="productDesc"></p>
        <p><strong>Fabric:</strong> <span id="fabricInfo"></span></p>
        <p><strong>Color:</strong> <span id="productColor">Cream</span></p>
        <div class="swatches"><span class="swatch" style="background:#ead8d0"></span><span class="swatch" style="background:#b76a5f"></span><span class="swatch" style="background:#416b4f"></span><span class="swatch" style="background:#d0b889"></span><span class="swatch" style="background:#9fb6b3"></span></div>
        <label>Quantity:</label>
        <div class="qty"><div class="qty-control"><button id="minusQty" type="button">-</button><span id="qtyValue">1</span><button id="plusQty" type="button">+</button></div></div>
        <div class="product-actions"> 
          <button class="btn btn-dark cart-btn" id="addToCart" type="button">Add to Cart</button>
          <button class="btn" id="buyNow" type="button">Buy Now</button>
        </div>
        <div class="trust-list">
          <div class="trust-line"><span data-icon="truck"></span> <span>Free Shipping on prepaid orders</span></div>
          <div class="trust-line"><span data-icon="clock"></span> <span>7 Days Easy Returns</span></div>
          <div class="trust-line"><span data-icon="bag"></span> <span>Cash on Delivery available</span></div>
        </div>
      </div>
    </section>
  </main>
  <div id="siteFooter"></div>
  <script src="app.js"></script>
</body>
</html>
