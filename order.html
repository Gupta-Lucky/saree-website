<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Place Order | RAM SAREES</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="order">
  <div id="siteChrome"></div>
  <main class="container narrow checkout-page order-page">
    <div class="checkout-heading">
      <span>Final confirmation</span>
      <h1>Place Your Order</h1>
      <p>Share your details with our team for a warm, personal WhatsApp confirmation.</p>
    </div>
    <section class="order-layout">
      <form class="form address-card" id="orderForm" novalidate>
        <div class="section-label">Order Form</div>
        <div class="form-grid">
          <label>
            <span>Name</span>
            <input name="name" type="text" placeholder="Enter your name" autocomplete="name" required>
            <small class="field-error" data-error-for="name"></small>
          </label>
          <label>
            <span>Phone Number</span>
            <input name="phone" type="tel" placeholder="10 digit mobile number" autocomplete="tel" inputmode="numeric" required>
            <small class="field-error" data-error-for="phone"></small>
          </label>
        </div>
        <label>
          <span>Address</span>
          <textarea name="address" placeholder="Complete delivery address" autocomplete="street-address" required></textarea>
          <small class="field-error" data-error-for="address"></small>
        </label>
        <div class="form-grid">
          <label>
            <span>Email <em>(optional)</em></span>
            <input name="email" type="email" placeholder="Email address" autocomplete="email">
            <small class="field-error" data-error-for="email"></small>
          </label>
          <label>
            <span>Gender</span>
            <select name="gender" required>
              <option value="">Select gender</option>
              <option>Female</option>
              <option>Male</option>
              <option>Prefer not to say</option>
            </select>
            <small class="field-error" data-error-for="gender"></small>
          </label>
        </div>
        <label>
          <span>Message / Special Instructions</span>
          <textarea name="message" placeholder="Blouse preference, gifting note, delivery timing, or any request"></textarea>
        </label>
        <button class="btn" type="submit">Place Order on WhatsApp</button>
      </form>
      <aside class="price-summary-card order-review">
        <div class="section-label">Order Review</div>
        <div id="orderReview"></div>
      </aside>
    </section>
  </main>
  <div id="siteFooter"></div>
  <script src="app.js"></script>
</body>
</html>
