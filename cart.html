<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | RAM SAREES</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="cart">
  <div id="siteChrome"></div>
  <main class="container narrow cart-page">
    <h1>Your Cart</h1>
    <div class="cart-table" id="cartRows" style="margin-top:34px"></div>
    <aside class="cart-summary" id="cartSummary">
      <h3>Cart Total</h3>
      <div class="summary-line"><span>Subtotal</span><strong id="subtotal">Rs. 0</strong></div>
      <div class="summary-line"><span>Shipping</span><strong>Free</strong></div>
      <div class="summary-line total"><span>Total</span><strong id="grandTotal">Rs. 0</strong></div>
      <a class="btn" href="checkout.html?checkout=cart" style="width:100%;margin-top:22px">Proceed to Checkout</a>
    </aside>
  </main>
  <div id="siteFooter"></div>
  <script src="app.js"></script>
</body>
</html>
