<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | RAM SAREES</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="cart">
  <div id="siteChrome"></div>
  <main class="container narrow cart-page">
    <h1>Your Cart</h1>
    <div class="cart-table spacing-top-medium" id="cartRows"></div>
    <aside class="cart-summary" id="cartSummary">
      <h3>Cart Total</h3>
      <div class="summary-line"><span>Subtotal</span><strong id="subtotal">₹0</strong></div>
      <div class="summary-line"><span>Shipping</span><strong>Free</strong></div>
      <div class="summary-line total"><span>Total</span><strong id="grandTotal">₹0</strong></div>
      <a class="btn full-width-btn" href="checkout.html?checkout=cart">Proceed to Checkout</a>
    </aside>
  </main>
  <div id="siteFooter"></div>
  <script src="app.js"></script>
</body>
</html>
