<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | RAM SAREES</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="contact">
  <div id="siteChrome"></div>
  <main class="container narrow contact-page">
    <h1>Contact Us</h1>
    <section class="two-col spacing-top-big">
      <div>
        <h3>We'd Love to Hear from You</h3>
        <p>Have a question or need help?<br>Feel free to reach out to us.</p>
        <div class="contact-details">
          <div class="contact-line"><span data-icon="phone"></span> <span>+91 9034452662</span></div>
          <div class="contact-line"><span data-icon="mail"></span> <span>support@ramsarees.com</span></div>
          <div class="contact-line"><span data-icon="clock"></span> <span>Mon - Sat: 10:00 AM - 7:00 PM</span></div>
          <div class="contact-line"><span data-icon="pin"></span> <span>Surat, Gujarat, India - 395002</span></div>
        </div>
      </div>
      <div>
        <h3>Send Us a Message</h3>
        <form class="form" id="contactForm">
          <input name="name" type="text" placeholder="Your Name" required>
          <input name="email" type="email" placeholder="Email Address">
          <input name="phone" type="tel" placeholder="Phone Number" required>
          <textarea name="message" placeholder="Your Message" required></textarea>
          <button class="btn" type="submit">Send Message</button>
        </form>
      </div>
    </section>
  </main>
  <div id="siteFooter"></div>
  <script src="app.js"></script>
</body>
</html>
